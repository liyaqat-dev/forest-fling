<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forest Roller - Super Ultra Deluxe</title>
    <style>
        :root { --primary: #2d4a27; --accent: #8db600; --sky: #1e3c40; --grass: #4a7c44; --gold: #ffd700; --hazard: #ff4444; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, sans-serif; touch-action: none; }
        canvas { display: block; filter: saturate(1.2) contrast(1.1); }
        
        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, rgba(45, 74, 39, 0.95) 0%, rgba(10, 20, 25, 1) 100%); z-index: 100; transition: 0.5s; color: white; text-align: center; backdrop-filter: blur(8px); }
        .hidden { opacity: 0; pointer-events: none; visibility: hidden; }
        
        h1 { font-family: 'Comic Sans MS', cursive; font-size: clamp(2rem, 10vw, 4rem); margin: 0; color: var(--accent); text-shadow: 0 5px 0 #1a2e17, 0 10px 20px rgba(0,0,0,0.5); transform: rotate(-2deg); animation: titleFloat 3s ease-in-out infinite; }
        @keyframes titleFloat { 0%, 100% { transform: rotate(-2deg) translateY(0); } 50% { transform: rotate(1deg) translateY(-10px); } }

        .best-score { font-size: 1rem; color: var(--gold); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; background: rgba(0,0,0,0.4); padding: 8px 25px; border-radius: 50px; border: 1px solid var(--gold); }
        
        .menu-btns { display: flex; flex-direction: column; gap: 12px; width: 280px; }
        button { cursor: pointer; padding: 14px; font-size: 1.1rem; font-weight: 900; border-radius: 12px; border: none; background: linear-gradient(to bottom, #8db600, #5c7a00); color: white; transition: 0.2s; box-shadow: 0 5px 0 #3a4d00; text-transform: uppercase; }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
        button:active { transform: translateY(3px); box-shadow: 0 2px 0 #3a4d00; }
        button.alt { background: #4a7c44; box-shadow: 0 5px 0 #1a2e17; }
        button.store { background: #b8860b; box-shadow: 0 5px 0 #7a5a07; }

        .shop-item { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; width: 90%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.2); }
        
        #game-ui { position: fixed; top: 20px; width: 100%; text-align: center; pointer-events: none; z-index: 10; display: none; }
        .stats { font-size: 1.1rem; font-weight: bold; background: rgba(0,0,0,0.8); color: var(--accent); padding: 10px 30px; border-radius: 50px; display: inline-flex; align-items: center; gap: 20px; border: 2px solid var(--accent); backdrop-filter: blur(4px); }
    </style>
</head>
<body>

    <div id="home-screen" class="screen">
        <h1>Forest Roller</h1>
        <div class="best-score">🏆 Best: <span id="high-score-val">0</span> | ✨ <span id="total-stars">0</span></div>
        <div class="menu-btns">
            <button onclick="startGame(1)">Adventure Mode</button>
            <button class="store" onclick="showScreen('shop-screen')">Forest Shop</button>
            <button class="alt" onclick="showScreen('char-screen')">Skins</button>
        </div>
    </div>

    <div id="shop-screen" class="screen hidden">
        <h1>The Shop</h1>
        <div class="best-score">✨ Your Balance: <span id="shop-stars">0</span></div>
        <div class="shop-item">
            <div><strong>Double Jump</strong><br><small>Jump again in mid-air</small></div>
            <button id="buy-dj" onclick="buyUpgrade('doubleJump', 150)">✨ 150</button>
        </div>
        <div class="shop-item">
            <div><strong>Star Magnet</strong><br><small>Attract stars from afar</small></div>
            <button id="buy-mag" onclick="buyUpgrade('magnet', 250)">✨ 250</button>
        </div>
        <button onclick="showScreen('home-screen')" style="margin-top: 20px; width: 200px;">Back</button>
    </div>

    <div id="char-screen" class="screen hidden">
        <h1>Select Skin</h1>
        <div style="display: flex; gap: 15px; margin-bottom: 30px;">
            <div onclick="selectSkin('#ff4444')"><div style="width:40px; height:40px; border-radius:50%; background:#ff4444; border:3px solid white;"></div></div>
            <div onclick="selectSkin('#44ff44')"><div style="width:40px; height:40px; border-radius:50%; background:#44ff44; border:3px solid white;"></div></div>
            <div onclick="selectSkin('#ffd700')"><div style="width:40px; height:40px; border-radius:50%; background:#ffd700; border:3px solid white;"></div></div>
            <div onclick="selectSkin('#8000ff')"><div style="width:40px; height:40px; border-radius:50%; background:#8000ff; border:3px solid white;"></div></div>
        </div>
        <button onclick="showScreen('home-screen')" style="width: 200px;">Back</button>
    </div>

    <div id="victory-screen" class="screen hidden">
        <h1 id="win-title" style="color: var(--gold);">LEVEL CLEAR!</h1>
        <p id="final-score" style="font-size: 1.8rem; margin: 20px 0;"></p>
        <button id="next-lvl-btn" onclick="nextLevel()">Next Level</button>
        <button onclick="showScreen('home-screen')" style="background:#4a7c44; margin-top:10px;">Menu</button>
    </div>

    <div id="game-ui">
        <div class="stats">
            <span>✨ <span id="score-val">0</span></span>
            <span id="level-indicator">LEVEL 1</span>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, gameState = 'MENU', cameraX = 0, score = 0, totalStars = parseInt(localStorage.getItem('frTotalStars')) || 0, currentLevel = 1;
        let ballColor = '#ff4444', skyColor = '#1e3c40';
        
        let upgrades = JSON.parse(localStorage.getItem('frUpgrades')) || { doubleJump: false, magnet: false };
        let highScore = localStorage.getItem('forestRollerHighScore') || 0;

        const sounds = {
            jump: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'),
            collect: new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3'),
            victory: new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3'),
            bgm: new Audio('https://www.chosic.com/wp-content/uploads/2021/04/Funny-Puppy.mp3')
        };
        sounds.bgm.loop = true; sounds.bgm.volume = 0.1;

        let ball = { x: 100, y: 0, vx: 0, vy: 0, radius: 25, speed: 0.7, friction: 0.92, gravity: 0.65, jumpStrength: -14, grounded: false, jumpCount: 0, rotation: 0, powerTimer: 0 };
        let platforms = [], foliage = [], enemies = [], collectibles = [], hazards = [], projectiles = [], boss = null, goal = { x: 0, y: 0 };

        function updatePersistence() {
            localStorage.setItem('frTotalStars', totalStars);
            localStorage.setItem('frUpgrades', JSON.stringify(upgrades));
            document.getElementById('total-stars').innerText = totalStars;
            document.getElementById('shop-stars').innerText = totalStars;
            document.getElementById('high-score-val').innerText = highScore;
            
            document.getElementById('buy-dj').innerText = upgrades.doubleJump ? "OWNED" : "✨ 150";
            document.getElementById('buy-mag').innerText = upgrades.magnet ? "OWNED" : "✨ 250";
        }

        function buyUpgrade(type, price) {
            if (!upgrades[type] && totalStars >= price) {
                totalStars -= price;
                upgrades[type] = true;
                updatePersistence();
            }
        }

        function selectSkin(c) { ballColor = c; }

        function initLevel(lvl) {
            currentLevel = lvl;
            document.getElementById('level-indicator').innerText = `LEVEL ${lvl}`;
            ball.x = 100; ball.y = height - 200; ball.vx = 0; ball.vy = 0; ball.jumpCount = 0;
            cameraX = 0; foliage = []; enemies = []; collectibles = []; hazards = []; projectiles = []; boss = null;
            score = 0; updateScoreUI();

            const themes = ['#1e3c40', '#2c3e50', '#1a0a2e', '#000000'];
            skyColor = themes[lvl-1] || themes[0];

            for(let i=0; i<40; i++) foliage.push({ x: Math.random() * 6000, y: height - 50, size: 50 + Math.random() * 150, speed: 0.1 + Math.random() * 0.4, color: `rgba(20, ${40+Math.random()*40}, 20, 0.6)` });

            if (lvl === 1) {
                goal = { x: 2500, y: height - 75 };
                platforms = [{x: 0, y: height-75, w: 3000, h: 75}, {x: 600, y: height-220, w: 250, h: 40}, {x: 1000, y: height-350, w: 200, h: 40}];
                for(let i=0; i<5; i++) collectibles.push({x: 500 + i*400, y: height-150});
            } else if (lvl === 2) {
                goal = { x: 3000, y: height - 400 };
                platforms = [{x: 0, y: height-75, w: 800, h: 75}, {x: 900, y: height-200, w: 300, h: 40, moveY: 120, baseY: height-200}, {x: 2400, y: height-400, w: 800, h: 400}];
                for(let i=0; i<8; i++) collectibles.push({x: 1000 + i*200, y: height-300});
            } else {
                goal = { x: 4000, y: height - 75 };
                platforms = [{x: 0, y: height-75, w: 5000, h: 75}];
                boss = { x: 3000, y: height - 250, size: 100, lastShot: 0 };
            }
        }

        function updateScoreUI() { document.getElementById('score-val').innerText = score; }

        function handleJump() {
            const maxJumps = upgrades.doubleJump ? 2 : 1;
            if (ball.grounded || ball.jumpCount < maxJumps) {
                ball.vy = ball.jumpStrength;
                ball.grounded = false;
                ball.jumpCount++;
                sounds.jump.play().catch(()=>{});
            }
        }

        function update() {
            if (gameState !== 'PLAYING') return;

            if (keys['ArrowRight'] || keys['d']) ball.vx += ball.speed;
            if (keys['ArrowLeft'] || keys['a']) ball.vx -= ball.speed;

            ball.vx *= ball.friction; ball.vy += ball.gravity;
            ball.x += ball.vx; ball.y += ball.vy; ball.rotation += ball.vx * 0.05;

            ball.grounded = false;
            platforms.forEach(p => {
                if(p.moveY) p.y = p.baseY + Math.sin(Date.now()*0.002) * p.moveY;
                if (ball.x + ball.radius > p.x && ball.x - ball.radius < p.x + p.w && ball.y + ball.radius > p.y && ball.y - ball.radius < p.y + p.h) {
                    if (ball.vy > 0 && ball.y < p.y + 20) { ball.y = p.y - ball.radius; ball.vy = 0; ball.grounded = true; ball.jumpCount = 0; }
                }
            });

            collectibles.forEach(c => {
                let d = Math.hypot(ball.x - c.x, ball.y - c.y);
                if (upgrades.magnet && d < 200) { c.x += (ball.x - c.x) * 0.1; c.y += (ball.y - c.y) * 0.1; }
                if(!c.collected && d < 40) { c.collected = true; score += 10; totalStars += 1; updateScoreUI(); sounds.collect.play(); }
            });

            if(ball.y > height + 300) initLevel(currentLevel);
            if (Math.abs(ball.x - goal.x) < 70) {
                gameState = 'WIN'; sounds.victory.play();
                if(score > highScore) { highScore = score; localStorage.setItem('forestRollerHighScore', score); }
                updatePersistence();
                document.getElementById('final-score').innerText = `Stars Collected: ${score/10}`;
                showScreen('victory-screen');
            }
            cameraX += (ball.x - width/3 - cameraX) * 0.1;
        }

        function draw() {
            ctx.fillStyle = skyColor; ctx.fillRect(0,0,width,height);
            foliage.forEach(f => {
                ctx.save(); ctx.translate(-cameraX * f.speed, 0); ctx.fillStyle = f.color;
                ctx.beginPath(); ctx.moveTo(f.x, f.y-f.size); ctx.lineTo(f.x-f.size/2, f.y); ctx.lineTo(f.x+f.size/2, f.y); ctx.fill(); ctx.restore();
            });
            ctx.save(); ctx.translate(-cameraX, 0);
            ctx.fillStyle = "#5d4037"; ctx.fillRect(goal.x-5, goal.y-100, 10, 100);
            ctx.fillStyle = "gold"; ctx.beginPath(); ctx.moveTo(goal.x, goal.y-100); ctx.lineTo(goal.x+40, goal.y-80); ctx.lineTo(goal.x, goal.y-60); ctx.fill();
            platforms.forEach(p => { ctx.fillStyle = "#3d2b1f"; ctx.fillRect(p.x, p.y, p.w, p.h); ctx.fillStyle = "#4a7c44"; ctx.fillRect(p.x, p.y, p.w, 10); });
            collectibles.forEach(c => { if(!c.collected) { ctx.fillStyle = "gold"; ctx.beginPath(); ctx.arc(c.x, c.y, 10, 0, Math.PI*2); ctx.fill(); }});
            if(boss) { ctx.fillStyle = "#2d4a27"; ctx.beginPath(); ctx.arc(boss.x, boss.y, boss.size, 0, Math.PI*2); ctx.fill(); }
            ctx.save(); ctx.translate(ball.x, ball.y); ctx.rotate(ball.rotation);
            ctx.fillStyle = ballColor; ctx.beginPath(); ctx.arc(0, 0, ball.radius, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(8, -6, 6, 0, Math.PI*2); ctx.arc(-8, -6, 6, 0, Math.PI*2); ctx.fill();
            ctx.restore(); ctx.restore();
        }

        function startGame(lvl) { showScreen(null); initLevel(lvl || 1); sounds.bgm.play().catch(()=>{}); }
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById('game-ui').style.display = id ? 'none' : 'block';
            if(id) { gameState = 'MENU'; document.getElementById(id).classList.remove('hidden'); updatePersistence(); }
            else { gameState = 'PLAYING'; }
        }
        let keys = {};
        window.addEventListener('keydown', e => { 
            if ((e.key==='w' || e.key==='ArrowUp' || e.key===' ') && !keys[e.key]) handleJump();
            keys[e.key] = true; 
        });
        window.addEventListener('keyup', e => keys[e.key] = false);
        window.addEventListener('resize', () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; });
        width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight;
        function nextLevel() { if(currentLevel < 3) startGame(currentLevel + 1); else showScreen('home-screen'); }
        updatePersistence();
        (function loop() { update(); draw(); requestAnimationFrame(loop); })();
    </script>
</body>
</html>
