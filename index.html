<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forest Roller - Deluxe Edition</title>
    <style>
        :root { --primary: #2d4a27; --accent: #8db600; --sky: #1e3c40; --grass: #4a7c44; --gold: #ffd700; --hazard: #ff4444; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--sky); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        canvas { display: block; background: linear-gradient(to bottom, #1e3c40, #4a7c44); filter: saturate(1.2) contrast(1.1); }
        
        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, rgba(45, 74, 39, 0.8) 0%, rgba(30, 60, 64, 0.95) 100%); z-index: 100; transition: 0.5s; color: white; text-align: center; backdrop-filter: blur(5px); }
        .hidden { opacity: 0; pointer-events: none; visibility: hidden; }
        
        h1 { font-family: 'Comic Sans MS', cursive; font-size: 4rem; margin: 0; color: var(--accent); text-shadow: 0 5px 0 #1a2e17, 0 10px 20px rgba(0,0,0,0.5); letter-spacing: -2px; transform: rotate(-2deg); animation: titleFloat 3s ease-in-out infinite; }
        @keyframes titleFloat { 0%, 100% { transform: rotate(-2deg) translateY(0); } 50% { transform: rotate(1deg) translateY(-10px); } }

        .best-score { font-size: 1.2rem; color: var(--gold); margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; background: rgba(0,0,0,0.3); padding: 5px 20px; border-radius: 20px; }
        
        .menu-btns { display: flex; flex-direction: column; gap: 15px; width: 280px; }
        button { cursor: pointer; padding: 15px 45px; font-size: 1.4rem; font-family: inherit; font-weight: 800; border-radius: 15px; border: none; background: linear-gradient(to bottom, #8db600, #5c7a00); color: white; transition: 0.2s; box-shadow: 0 6px 0 #3a4d00, 0 10px 20px rgba(0,0,0,0.3); text-transform: uppercase; }
        button:hover { transform: scale(1.05); filter: brightness(1.1); }
        button:active { transform: translateY(4px); box-shadow: 0 2px 0 #3a4d00; }
        
        #game-ui { position: fixed; top: 20px; width: 100%; text-align: center; pointer-events: none; z-index: 10; display: none; }
        .stats { font-size: 1.1rem; font-weight: bold; background: rgba(0,0,0,0.7); color: var(--accent); padding: 10px 30px; border-radius: 50px; display: inline-flex; align-items: center; gap: 15px; border: 2px solid var(--accent); backdrop-filter: blur(5px); }
        #powerup-timer { color: #d880ff; font-weight: bold; margin-top: 10px; display: none; text-shadow: 0 0 10px #d880ff; }

        .skin-grid { display: flex; gap: 20px; margin-bottom: 30px; }
        .skin-card { padding: 20px; background: rgba(255,255,255,0.1); border-radius: 20px; cursor: pointer; border: 3px solid transparent; transition: 0.3s; }
        .skin-card.active { border-color: var(--gold); background: rgba(255,255,255,0.2); }
        .skin-preview { width: 50px; height: 50px; border-radius: 50%; margin: 0 auto 10px; border: 3px solid white; }
    </style>
</head>
<body>

    <div id="home-screen" class="screen">
        <h1>Forest Roller</h1>
        <div class="best-score">🏆 Best Score: <span id="high-score-val">0</span></div>
        <div class="menu-btns">
            <button onclick="startGame(1)">Start Game</button>
            <button onclick="showScreen('char-screen')" style="background: linear-gradient(to bottom, #4a7c44, #2d4a27); box-shadow: 0 6px 0 #1a2e17;">Skins</button>
        </div>
    </div>

    <div id="victory-screen" class="screen hidden">
        <h1 id="win-title" style="color: var(--gold); transform:none;">LEVEL CLEAR!</h1>
        <p id="final-score" style="font-size: 2rem; margin: 20px 0;"></p>
        <button id="next-lvl-btn" onclick="nextLevel()">Next Level</button>
        <button onclick="showScreen('home-screen')" style="background:#4a7c44;">Main Menu</button>
    </div>

    <div id="char-screen" class="screen hidden">
        <h1>Select Skin</h1>
        <div class="skin-grid">
            <div class="skin-card active" onclick="selectSkin('#ff4444', this)">
                <div class="skin-preview" style="background:#ff4444;"></div>
                Classic
            </div>
            <div class="skin-card" onclick="selectSkin('#44ff44', this)">
                <div class="skin-preview" style="background:#44ff44;"></div>
                Forest
            </div>
            <div class="skin-card" onclick="selectSkin('#ffd700', this)">
                <div class="skin-preview" style="background:#ffd700;"></div>
                Gold
            </div>
        </div>
        <button onclick="showScreen('home-screen')">Back</button>
    </div>

    <div id="game-ui">
        <div id="stats-bar" class="stats">
            <span>✨ <span id="score-val">0</span></span>
            <span style="color:white; opacity:0.2;">|</span>
            <span id="level-indicator">LEVEL 1</span>
        </div>
        <div id="powerup-timer">⚡ SPEED BOOST ACTIVE ⚡</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, gameState = 'MENU', cameraX = 0, score = 0, currentLevel = 1;
        let ballColor = '#ff4444';
        
        let highScore = localStorage.getItem('forestRollerHighScore') || 0;
        document.getElementById('high-score-val').innerText = highScore;

        const sounds = {
            jump: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'),
            squish: new Audio('https://assets.mixkit.co/active_storage/sfx/2510/2510-preview.mp3'),
            collect: new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3'),
            powerup: new Audio('https://assets.mixkit.co/active_storage/sfx/600/600-preview.mp3'),
            victory: new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3'),
            bgm: new Audio('https://www.chosic.com/wp-content/uploads/2021/04/Funny-Puppy.mp3')
        };
        sounds.bgm.loop = true;
        sounds.bgm.volume = 0.15;

        let ball = { x: 100, y: 0, vx: 0, vy: 0, radius: 25, baseSpeed: 0.7, speed: 0.7, friction: 0.9, gravity: 0.6, jumpStrength: -13, grounded: false, rotation: 0, powerTimer: 0 };
        let keys = {}, platforms = [], foliage = [], enemies = [], collectibles = [], mushrooms = [], hazards = [], goal = { x: 0, y: 0 };

        function selectSkin(color, el) {
            ballColor = color;
            document.querySelectorAll('.skin-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        function initLevel(lvl) {
            currentLevel = lvl;
            document.getElementById('level-indicator').innerText = `LEVEL ${lvl}`;
            ball.x = 100; ball.y = height - 200; ball.vx = 0; ball.vy = 0; ball.powerTimer = 0;
            cameraX = 0; foliage = []; enemies = []; collectibles = []; mushrooms = []; hazards = [];
            score = 0; updateScoreUI();
            
            // Generate Parallax Foliage
            for(let i=0; i<40; i++) {
                foliage.push({ 
                    x: Math.random() * 5000, 
                    y: height - 50, 
                    size: 60 + Math.random() * 120, 
                    speed: 0.2 + Math.random() * 0.5, // Parallax factor
                    color: `rgb(20, ${30 + Math.random() * 40}, 20)` 
                });
            }

            if (lvl === 1) {
                goal = { x: 2500, y: height - 75 };
                platforms = [
                    {x: 0, y: height-75, w: 3000, h: 75, type: 'dirt'},
                    {x: 600, y: height-220, w: 250, h: 40, type: 'wood'},
                    {x: 1000, y: height-350, w: 200, h: 40, type: 'wood'},
                    {x: 1500, y: height-250, w: 400, h: 40, type: 'wood'}
                ];
                enemies.push({ x: 800, y: height-95, range: 200, startX: 800, speed: 2, dead: false });
                collectibles.push({x: 1050, y: height-400, collected: false});
            } else if (lvl === 2) {
                goal = { x: 3200, y: height - 300 };
                platforms = [
                    {x: 0, y: height-75, w: 800, h: 75, type: 'dirt'},
                    {x: 900, y: height-200, w: 300, h: 40, type: 'wood', moveY: 100, baseY: height-200},
                    {x: 1400, y: height-350, w: 300, h: 40, type: 'wood', moveX: 200, baseX: 1400},
                    {x: 2000, y: height-250, w: 500, h: 40, type: 'wood'},
                    {x: 2700, y: height-400, w: 600, h: 400, type: 'dirt'}
                ];
                enemies.push({ x: 2100, y: height-275, range: 120, startX: 2100, speed: 3, dead: false });
                mushrooms.push({ x: 1100, y: height-450, collected: false });
            } else { // LEVEL 3 - THE DARK WOODS
                goal = { x: 3800, y: height - 500 };
                platforms = [
                    {x: 0, y: height-75, w: 600, h: 75, type: 'dirt'},
                    {x: 700, y: height-75, w: 400, h: 75, type: 'dirt'},
                    {x: 1200, y: height-200, w: 200, h: 40, type: 'wood'},
                    {x: 1500, y: height-350, w: 200, h: 40, type: 'wood'},
                    {x: 1800, y: height-500, w: 200, h: 40, type: 'wood'},
                    {x: 2200, y: height-75, w: 1000, h: 75, type: 'dirt'},
                    {x: 3400, y: height-500, w: 600, h: 500, type: 'dirt'}
                ];
                hazards.push({x: 600, y: height-75, w: 100, h: 20}); // Spike pit
                hazards.push({x: 2500, y: height-95, w: 300, h: 20}); // Long spikes
                enemies.push({ x: 2300, y: height-95, range: 300, startX: 2300, speed: 4, dead: false });
                mushrooms.push({ x: 1850, y: height-550, collected: false });
            }
        }

        function updateScoreUI() { document.getElementById('score-val').innerText = score; }

        function nextLevel() {
            if(currentLevel < 3) startGame(currentLevel + 1);
            else showScreen('home-screen');
        }

        function update() {
            if (gameState !== 'PLAYING') return;

            // Input
            if (keys['ArrowRight'] || keys['d']) ball.vx += ball.speed;
            if (keys['ArrowLeft'] || keys['a']) ball.vx -= ball.speed;
            if ((keys['ArrowUp'] || keys['w'] || keys[' ']) && ball.grounded) {
                ball.vy = ball.jumpStrength; ball.grounded = false;
                sounds.jump.play().catch(()=>{});
            }

            // Physics
            ball.vx *= ball.friction; ball.vy += ball.gravity;
            ball.x += ball.vx; ball.y += ball.vy; ball.rotation += ball.vx * 0.05;

            // Platforms
            ball.grounded = false;
            platforms.forEach(p => {
                if(p.moveY) p.y = p.baseY + Math.sin(Date.now()*0.002) * p.moveY;
                if(p.moveX) p.x = p.baseX + Math.cos(Date.now()*0.002) * p.moveX;

                if (ball.x + ball.radius > p.x && ball.x - ball.radius < p.x + p.w && 
                    ball.y + ball.radius > p.y && ball.y - ball.radius < p.y + p.h) {
                    if (ball.vy > 0 && ball.y < p.y + 15) {
                        ball.y = p.y - ball.radius; ball.vy = 0; ball.grounded = true;
                        if(p.moveX) ball.x += Math.cos(Date.now()*0.002) * 2;
                    }
                }
            });

            // Hazards (Spikes)
            hazards.forEach(h => {
                if (ball.x + ball.radius > h.x && ball.x - ball.radius < h.x + h.w &&
                    ball.y + ball.radius > h.y) {
                    initLevel(currentLevel);
                }
            });

            // Enemy AI
            enemies.forEach(en => {
                if(!en.dead) {
                    en.x += en.speed;
                    if(Math.abs(en.x - en.startX) > en.range) en.speed *= -1;
                    let dist = Math.hypot(ball.x - en.x, ball.y - en.y);
                    if(dist < ball.radius + 15) {
                        if(ball.vy > 0 && ball.y < en.y - 5) {
                            en.dead = true; ball.vy = -10; score += 10; updateScoreUI();
                            sounds.squish.play().catch(()=>{});
                        } else { initLevel(currentLevel); }
                    }
                }
            });

            // Collectibles
            collectibles.forEach(c => {
                if(!c.collected && Math.hypot(ball.x - c.x, ball.y - c.y) < 40) {
                    c.collected = true; score += 5; updateScoreUI(); sounds.collect.play().catch(()=>{});
                }
            });

            mushrooms.forEach(m => {
                if (!m.collected && Math.hypot(ball.x - m.x, ball.y - m.y) < 40) {
                    m.collected = true; ball.powerTimer = 400; sounds.powerup.play().catch(()=>{});
                }
            });

            if (ball.powerTimer > 0) {
                ball.powerTimer--; ball.speed = 1.4;
                document.getElementById('powerup-timer').style.display = 'block';
            } else { ball.speed = 0.7; document.getElementById('powerup-timer').style.display = 'none'; }

            if(ball.y > height + 200) initLevel(currentLevel);

            if (Math.abs(ball.x - goal.x) < 60 && Math.abs(ball.y - (goal.y - 50)) < 150) {
                gameState = 'WIN';
                sounds.victory.play().catch(()=>{});
                if(score > highScore) {
                    highScore = score; localStorage.setItem('forestRollerHighScore', score);
                    document.getElementById('high-score-val').innerText = score;
                }
                document.getElementById('final-score').innerText = `Level ${currentLevel} Complete!`;
                document.getElementById('win-title').innerText = currentLevel >= 3 ? "GAME CLEAR!" : "LEVEL CLEAR!";
                document.getElementById('next-lvl-btn').innerText = currentLevel >= 3 ? "Finish" : "Next Level";
                showScreen('victory-screen');
            }

            cameraX += (ball.x - width/3 - cameraX) * 0.08;
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            
            // DRAW PARALLAX FOLIAGE
            foliage.forEach(f => {
                ctx.save();
                ctx.translate(-cameraX * f.speed, 0); // Apply individual speed for parallax
                ctx.fillStyle = f.color; ctx.beginPath();
                ctx.moveTo(f.x, f.y-f.size); ctx.lineTo(f.x-f.size/2, f.y); ctx.lineTo(f.x+f.size/2, f.y); ctx.fill();
                ctx.restore();
            });

            ctx.save(); ctx.translate(-cameraX, 0);

            // Draw Hazards
            hazards.forEach(h => {
                ctx.fillStyle = "#888";
                for(let i=0; i < h.w; i+=20) {
                    ctx.beginPath(); ctx.moveTo(h.x + i, h.y); ctx.lineTo(h.x + i + 10, h.y - 20); ctx.lineTo(h.x + i + 20, h.y); ctx.fill();
                }
            });

            platforms.forEach(p => {
                ctx.fillStyle = p.type === 'dirt' ? "#3d2b1f" : "#5d4037"; ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.fillStyle = "#4a7c44"; ctx.fillRect(p.x, p.y, p.w, 10);
            });

            collectibles.forEach(c => {
                if(!c.collected) {
                    ctx.fillStyle = "#ffd700"; ctx.beginPath();
                    ctx.arc(c.x, c.y + Math.sin(Date.now()*0.005)*10, 10, 0, Math.PI*2); ctx.fill();
                }
            });

            mushrooms.forEach(m => {
                if(!m.collected) {
                    ctx.fillStyle = "#9c27b0"; ctx.beginPath(); ctx.arc(m.x, m.y, 15, Math.PI, 0); ctx.fill();
                    ctx.fillStyle = "#eee"; ctx.fillRect(m.x-5, m.y, 10, 10);
                }
            });

            enemies.forEach(en => {
                if(!en.dead) {
                    ctx.fillStyle = "#1a1a1a"; ctx.beginPath(); ctx.arc(en.x, en.y, 18, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(en.x-5, en.y-5, 3, 0, Math.PI*2); ctx.arc(en.x+5, en.y-5, 3, 0, Math.PI*2); ctx.fill();
                }
            });

            ctx.fillStyle = "#5d4037"; ctx.fillRect(goal.x-5, goal.y-100, 10, 100);
            ctx.fillStyle = "#ffd700"; ctx.beginPath(); ctx.moveTo(goal.x, goal.y-100); ctx.lineTo(goal.x+40, goal.y-80); ctx.lineTo(goal.x, goal.y-60); ctx.fill();

            // Ball
            ctx.save(); ctx.translate(ball.x, ball.y); ctx.rotate(ball.rotation);
            if(ball.powerTimer > 0) { ctx.shadowBlur = 15; ctx.shadowColor = "#d880ff"; }
            ctx.fillStyle = ballColor; ctx.beginPath(); ctx.arc(0, 0, ball.radius, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(8, -6, 6, 0, Math.PI*2); ctx.arc(-8, -6, 6, 0, Math.PI*2); ctx.fill();
            ctx.restore();

            ctx.restore();
        }

        function startGame(lvl) {
            showScreen(null);
            initLevel(lvl || 1);
            sounds.bgm.play().catch(() => {});
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById('game-ui').style.display = id ? 'none' : 'block';
            if(id) { gameState = 'MENU'; document.getElementById(id).classList.remove('hidden'); }
            else { gameState = 'PLAYING'; }
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);
        window.addEventListener('resize', resize);
        resize(); loop();
    </script>
</body>
</html>
