<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forest Roller - Ultra Deluxe</title>
    <style>
        :root { --primary: #2d4a27; --accent: #8db600; --sky: #1e3c40; --grass: #4a7c44; --gold: #ffd700; --hazard: #ff4444; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, sans-serif; touch-action: none; }
        canvas { display: block; filter: saturate(1.2) contrast(1.1); }
        
        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, rgba(45, 74, 39, 0.9) 0%, rgba(10, 20, 25, 1) 100%); z-index: 100; transition: 0.5s; color: white; text-align: center; backdrop-filter: blur(8px); }
        .hidden { opacity: 0; pointer-events: none; visibility: hidden; }
        
        h1 { font-family: 'Comic Sans MS', cursive; font-size: clamp(2rem, 10vw, 4rem); margin: 0; color: var(--accent); text-shadow: 0 5px 0 #1a2e17, 0 10px 20px rgba(0,0,0,0.5); transform: rotate(-2deg); animation: titleFloat 3s ease-in-out infinite; }
        @keyframes titleFloat { 0%, 100% { transform: rotate(-2deg) translateY(0); } 50% { transform: rotate(1deg) translateY(-10px); } }

        .best-score { font-size: 1.2rem; color: var(--gold); margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; background: rgba(0,0,0,0.4); padding: 8px 25px; border-radius: 50px; border: 1px solid var(--gold); }
        
        .menu-btns { display: flex; flex-direction: column; gap: 15px; width: 280px; }
        button { cursor: pointer; padding: 15px; font-size: 1.2rem; font-weight: 900; border-radius: 15px; border: none; background: linear-gradient(to bottom, #8db600, #5c7a00); color: white; transition: 0.2s; box-shadow: 0 6px 0 #3a4d00; text-transform: uppercase; }
        button:hover { transform: translateY(-2px) scale(1.02); filter: brightness(1.1); }
        button:active { transform: translateY(4px); box-shadow: 0 2px 0 #3a4d00; }
        
        #game-ui { position: fixed; top: 20px; width: 100%; text-align: center; pointer-events: none; z-index: 10; display: none; }
        .stats { font-size: 1.1rem; font-weight: bold; background: rgba(0,0,0,0.8); color: var(--accent); padding: 10px 30px; border-radius: 50px; display: inline-flex; align-items: center; gap: 20px; border: 2px solid var(--accent); backdrop-filter: blur(4px); }
        #powerup-timer { color: #d880ff; font-weight: bold; margin-top: 10px; display: none; text-shadow: 0 0 10px #d880ff; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .skin-grid { display: flex; gap: 15px; margin-bottom: 30px; }
        .skin-card { padding: 15px; background: rgba(255,255,255,0.05); border-radius: 15px; cursor: pointer; border: 2px solid transparent; transition: 0.3s; }
        .skin-card.active { border-color: var(--gold); background: rgba(255,255,255,0.15); }
        .skin-preview { width: 40px; height: 40px; border-radius: 50%; margin: 0 auto 10px; border: 3px solid white; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="home-screen" class="screen">
        <h1>Forest Roller</h1>
        <div class="best-score">🏆 Best: <span id="high-score-val">0</span></div>
        <div class="menu-btns">
            <button onclick="startGame(1)">Adventure Mode</button>
            <button onclick="showScreen('char-screen')" style="background: #4a7c44; box-shadow: 0 6px 0 #1a2e17;">Skins</button>
        </div>
    </div>

    <div id="victory-screen" class="screen hidden">
        <h1 id="win-title" style="color: var(--gold);">LEVEL CLEAR!</h1>
        <p id="final-score" style="font-size: 1.8rem; margin: 20px 0;"></p>
        <button id="next-lvl-btn" onclick="nextLevel()">Next Level</button>
        <button onclick="showScreen('home-screen')" style="background:#4a7c44; margin-top:10px;">Menu</button>
    </div>

    <div id="char-screen" class="screen hidden">
        <h1>Select Skin</h1>
        <div class="skin-grid">
            <div class="skin-card active" onclick="selectSkin('#ff4444', this)"><div class="skin-preview" style="background:#ff4444;"></div>Classic</div>
            <div class="skin-card" onclick="selectSkin('#44ff44', this)"><div class="skin-preview" style="background:#44ff44;"></div>Forest</div>
            <div class="skin-card" onclick="selectSkin('#ffd700', this)"><div class="skin-preview" style="background:#ffd700;"></div>Gold</div>
            <div class="skin-card" onclick="selectSkin('#8000ff', this)"><div class="skin-preview" style="background:#8000ff;"></div>Void</div>
        </div>
        <button onclick="showScreen('home-screen')">Save & Back</button>
    </div>

    <div id="game-ui">
        <div id="stats-bar" class="stats">
            <span>✨ <span id="score-val">0</span></span>
            <span id="level-indicator">LEVEL 1</span>
        </div>
        <div id="powerup-timer">⚡ OVERDRIVE ⚡</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, gameState = 'MENU', cameraX = 0, score = 0, currentLevel = 1;
        let ballColor = '#ff4444', skyColor = '#1e3c40';
        
        let highScore = localStorage.getItem('forestRollerHighScore') || 0;
        document.getElementById('high-score-val').innerText = highScore;

        const sounds = {
            jump: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'),
            squish: new Audio('https://assets.mixkit.co/active_storage/sfx/2510/2510-preview.mp3'),
            collect: new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3'),
            powerup: new Audio('https://assets.mixkit.co/active_storage/sfx/600/600-preview.mp3'),
            victory: new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3'),
            hit: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'),
            bgm: new Audio('https://www.chosic.com/wp-content/uploads/2021/04/Funny-Puppy.mp3')
        };
        sounds.bgm.loop = true; sounds.bgm.volume = 0.1;

        let ball = { x: 100, y: 0, vx: 0, vy: 0, radius: 25, speed: 0.7, friction: 0.92, gravity: 0.65, jumpStrength: -14, grounded: false, rotation: 0, powerTimer: 0 };
        let keys = {}, platforms = [], foliage = [], enemies = [], collectibles = [], mushrooms = [], hazards = [], boss = null, projectiles = [], goal = { x: 0, y: 0 };

        function selectSkin(color, el) {
            ballColor = color;
            document.querySelectorAll('.skin-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        function initLevel(lvl) {
            currentLevel = lvl;
            document.getElementById('level-indicator').innerText = `LEVEL ${lvl}`;
            ball.x = 100; ball.y = height - 200; ball.vx = 0; ball.vy = 0; ball.powerTimer = 0;
            cameraX = 0; foliage = []; enemies = []; collectibles = []; mushrooms = []; hazards = []; projectiles = []; boss = null;
            score = 0; updateScoreUI();

            // Dynamic Background based on level
            const themes = ['#1e3c40', '#2c3e50', '#1a0a2e', '#000000'];
            skyColor = themes[lvl-1] || themes[0];

            for(let i=0; i<50; i++) {
                foliage.push({ x: Math.random() * 6000, y: height - 50, size: 50 + Math.random() * 150, speed: 0.1 + Math.random() * 0.4, color: `rgba(20, ${40 + Math.random() * 40}, 20, ${0.4 + Math.random() * 0.6})` });
            }

            if (lvl === 1) {
                goal = { x: 2500, y: height - 75 };
                platforms = [{x: 0, y: height-75, w: 3000, h: 75, type: 'dirt'}, {x: 600, y: height-220, w: 250, h: 40}, {x: 1000, y: height-350, w: 200, h: 40}, {x: 1500, y: height-250, w: 400, h: 40}];
                enemies.push({ x: 800, y: height-95, range: 200, startX: 800, speed: 2 });
                collectibles.push({x: 1050, y: height-400});
            } else if (lvl === 2) {
                goal = { x: 3000, y: height - 400 };
                platforms = [{x: 0, y: height-75, w: 800, h: 75}, {x: 900, y: height-200, w: 300, h: 40, moveY: 120, baseY: height-200}, {x: 1400, y: height-350, w: 300, h: 40, moveX: 200, baseX: 1400}, {x: 2400, y: height-400, w: 800, h: 400}];
                mushrooms.push({ x: 1100, y: height-450 });
            } else if (lvl === 3) {
                goal = { x: 3500, y: height - 75 };
                platforms = [{x: 0, y: height-75, w: 600, h: 75}, {x: 1000, y: height-75, w: 1000, h: 75}, {x: 2500, y: height-75, w: 1500, h: 75}];
                hazards.push({x: 600, y: height-75, w: 400, h: 20}, {x: 2000, y: height-75, w: 500, h: 20});
                enemies.push({ x: 1200, y: height-95, range: 300, startX: 1200, speed: 4 });
            } else { // BOSS LEVEL
                goal = { x: 4500, y: height - 75 };
                platforms = [{x: 0, y: height-75, w: 5000, h: 75}];
                boss = { x: 2500, y: height - 250, size: 100, hp: 5, lastShot: 0 };
            }
        }

        function updateScoreUI() { document.getElementById('score-val').innerText = score; }

        function nextLevel() {
            if(currentLevel < 4) startGame(currentLevel + 1);
            else showScreen('home-screen');
        }

        function update() {
            if (gameState !== 'PLAYING') return;

            // Physics & Input
            if (keys['ArrowRight'] || keys['d']) ball.vx += ball.speed;
            if (keys['ArrowLeft'] || keys['a']) ball.vx -= ball.speed;
            if ((keys['ArrowUp'] || keys['w'] || keys[' ']) && ball.grounded) {
                ball.vy = ball.jumpStrength; ball.grounded = false;
                sounds.jump.play().catch(()=>{});
            }

            ball.vx *= ball.friction; ball.vy += ball.gravity;
            ball.x += ball.vx; ball.y += ball.vy; ball.rotation += ball.vx * 0.05;

            // Platform Collision
            ball.grounded = false;
            platforms.forEach(p => {
                if(p.moveY) p.y = p.baseY + Math.sin(Date.now()*0.002) * p.moveY;
                if(p.moveX) p.x = p.baseX + Math.cos(Date.now()*0.002) * p.moveX;
                if (ball.x + ball.radius > p.x && ball.x - ball.radius < p.x + p.w && ball.y + ball.radius > p.y && ball.y - ball.radius < p.y + p.h) {
                    if (ball.vy > 0 && ball.y < p.y + 20) { ball.y = p.y - ball.radius; ball.vy = 0; ball.grounded = true; if(p.moveX) ball.x += Math.cos(Date.now()*0.002) * 2; }
                }
            });

            // Hazards & Projectiles
            [...hazards, ...projectiles].forEach(h => {
                let dx = ball.x - (h.x + (h.w/2 || 0));
                let dy = ball.y - (h.y + (h.h/2 || 0));
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < ball.radius + 10 || (ball.x > h.x && ball.x < h.x + h.w && ball.y + ball.radius > h.y && !h.radius)) {
                    initLevel(currentLevel);
                }
            });

            // Boss Logic
            if(boss) {
                if(Date.now() - boss.lastShot > 1500) {
                    projectiles.push({x: boss.x, y: boss.y, vx: -6, vy: -5, w: 20, h: 20});
                    boss.lastShot = Date.now();
                }
            }
            projectiles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.2; });

            // Enemies
            enemies.forEach(en => {
                if(!en.dead) {
                    en.x += en.speed;
                    if(Math.abs(en.x - en.startX) > en.range) en.speed *= -1;
                    if(Math.hypot(ball.x - en.x, ball.y - en.y) < ball.radius + 15) {
                        if(ball.vy > 0 && ball.y < en.y) { en.dead = true; ball.vy = -12; score += 20; sounds.squish.play(); }
                        else initLevel(currentLevel);
                    }
                }
            });

            // Collectibles
            collectibles.forEach(c => { if(!c.collected && Math.hypot(ball.x - c.x, ball.y - c.y) < 40) { c.collected = true; score += 50; updateScoreUI(); sounds.collect.play(); }});
            mushrooms.forEach(m => { if (!m.collected && Math.hypot(ball.x - m.x, ball.y - m.y) < 40) { m.collected = true; ball.powerTimer = 300; sounds.powerup.play(); }});

            if (ball.powerTimer > 0) { ball.powerTimer--; ball.speed = 1.3; document.getElementById('powerup-timer').style.display = 'block'; } 
            else { ball.speed = 0.7; document.getElementById('powerup-timer').style.display = 'none'; }

            if(ball.y > height + 300) initLevel(currentLevel);
            if (Math.abs(ball.x - goal.x) < 70) {
                gameState = 'WIN';
                sounds.victory.play();
                if(score > highScore) { highScore = score; localStorage.setItem('forestRollerHighScore', score); document.getElementById('high-score-val').innerText = score; }
                document.getElementById('final-score').innerText = `Score: ${score}`;
                document.getElementById('win-title').innerText = currentLevel >= 4 ? "ALL LEVELS COMPLETE!" : "LEVEL CLEAR!";
                showScreen('victory-screen');
            }

            cameraX += (ball.x - width/3 - cameraX) * 0.1;
        }

        function draw() {
            ctx.fillStyle = skyColor; ctx.fillRect(0,0,width,height);
            
            foliage.forEach(f => {
                ctx.save(); ctx.translate(-cameraX * f.speed, 0); ctx.fillStyle = f.color;
                ctx.beginPath(); ctx.moveTo(f.x, f.y-f.size); ctx.lineTo(f.x-f.size/2, f.y); ctx.lineTo(f.x+f.size/2, f.y); ctx.fill();
                ctx.restore();
            });

            ctx.save(); ctx.translate(-cameraX, 0);

            // Flag
            ctx.fillStyle = "#5d4037"; ctx.fillRect(goal.x-5, goal.y-100, 10, 100);
            ctx.fillStyle = var(--gold); ctx.beginPath(); ctx.moveTo(goal.x, goal.y-100); ctx.lineTo(goal.x+40, goal.y-80); ctx.lineTo(goal.x, goal.y-60); ctx.fill();

            // Platforms & Hazards
            platforms.forEach(p => { ctx.fillStyle = "#3d2b1f"; ctx.fillRect(p.x, p.y, p.w, p.h); ctx.fillStyle = "#4a7c44"; ctx.fillRect(p.x, p.y, p.w, 10); });
            hazards.forEach(h => { ctx.fillStyle = "#ff4444"; for(let i=0; i<h.w; i+=20) { ctx.beginPath(); ctx.moveTo(h.x+i, h.y); ctx.lineTo(h.x+i+10, h.y-25); ctx.lineTo(h.x+i+20, h.y); ctx.fill(); }});

            // Boss
            if(boss) {
                ctx.fillStyle = "#2d4a27"; ctx.beginPath(); ctx.arc(boss.x, boss.y, boss.size, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(boss.x-30, boss.y-20, 15, 0, Math.PI*2); ctx.arc(boss.x+30, boss.y-20, 15, 0, Math.PI*2); ctx.fill();
            }
            projectiles.forEach(p => { ctx.fillStyle = "orange"; ctx.beginPath(); ctx.arc(p.x, p.y, 10, 0, Math.PI*2); ctx.fill(); });

            enemies.forEach(en => { if(!en.dead) { ctx.fillStyle = "#111"; ctx.beginPath(); ctx.arc(en.x, en.y, 18, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = "red"; ctx.fillRect(en.x-10, en.y-5, 20, 2); }});
            collectibles.forEach(c => { if(!c.collected) { ctx.fillStyle = "gold"; ctx.beginPath(); ctx.arc(c.x, c.y + Math.sin(Date.now()*0.005)*10, 10, 0, Math.PI*2); ctx.fill(); }});
            mushrooms.forEach(m => { if(!m.collected) { ctx.fillStyle = "#9c27b0"; ctx.beginPath(); ctx.arc(m.x, m.y, 15, Math.PI, 0); ctx.fill(); ctx.fillStyle = "#eee"; ctx.fillRect(m.x-5, m.y, 10, 10); }});

            // Ball
            ctx.save(); ctx.translate(ball.x, ball.y); ctx.rotate(ball.rotation);
            if(ball.powerTimer > 0) { ctx.shadowBlur = 20; ctx.shadowColor = "#d880ff"; }
            ctx.fillStyle = ballColor; ctx.beginPath(); ctx.arc(0, 0, ball.radius, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(8, -6, 6, 0, Math.PI*2); ctx.arc(-8, -6, 6, 0, Math.PI*2); ctx.fill();
            ctx.restore();

            ctx.restore();
        }

        function startGame(lvl) { showScreen(null); initLevel(lvl || 1); sounds.bgm.play().catch(()=>{}); }
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById('game-ui').style.display = id ? 'none' : 'block';
            if(id) { gameState = 'MENU'; document.getElementById(id).classList.remove('hidden'); }
            else { gameState = 'PLAYING'; }
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);
        window.addEventListener('resize', resize);
        resize(); loop();
    </script>
</body>
</html>
